<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Through. Work Smarter. - Cinematic Hero</title>
    <meta name="description" content="A voyage through forgotten realms, where past and future intertwine.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Background Video */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Blur Overlay */
        .blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            z-index: 1;
            pointer-events: none;
            mask-image: linear-gradient(to top, black 0%, transparent 45%);
            -webkit-mask-image: linear-gradient(to top, black 0%, transparent 45%);
        }

        /* Liquid Glass Class */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: inherit;
            cursor: pointer;
            transition: all 0.3s ease-out;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.45) 0%,
                rgba(255, 255, 255, 0.15) 20%,
                rgba(255, 255, 255, 0) 40%,
                rgba(255, 255, 255, 0) 60%,
                rgba(255, 255, 255, 0.15) 80%,
                rgba(255, 255, 255, 0.45) 100%
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .liquid-glass:hover {
            background: rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.15);
        }

        /* Blur Fade Up Animation */
        @keyframes blurFadeUp {
            from {
                opacity: 0;
                filter: blur(20px);
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }

        .animate-blur-fade-up {
            animation: blurFadeUp 1s ease-out forwards;
            opacity: 0;
        }

        /* Container */
        .page-container {
            position: relative;
            width: 100%;
            height: 100vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            padding: 1rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        @media (min-width: 768px) {
            .navbar {
                padding: 1.5rem 3rem;
            }
        }

        .navbar-logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            height: 2rem;
            display: flex;
            align-items: center;
        }

        @media (min-width: 768px) {
            .navbar-logo {
                height: 2.5rem;
                font-size: 1.5rem;
            }
        }

        .navbar-center {
            display: none;
            gap: 2rem;
            align-items: center;
        }

        @media (min-width: 1024px) {
            .navbar-center {
                display: flex;
            }
        }

        .nav-link {
            font-size: 0.875rem;
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease-out;
        }

        .nav-link:hover {
            color: #d1d5db;
        }

        .navbar-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        @media (max-width: 639px) {
            .search-btn-desktop, .user-btn-desktop {
                display: none;
            }
        }

        .search-btn, .user-btn, .hamburger-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.01);
            border: none;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease-out;
        }

        @media (min-width: 640px) {
            .search-btn {
                width: auto;
                padding: 0.5rem 1.5rem;
                gap: 0.5rem;
                display: flex;
                align-items: center;
                font-size: 0.875rem;
            }

            @media (min-width: 768px) {
                .search-btn {
                    padding: 0.5rem 1.5rem;
                }
            }
        }

        .search-btn:hover, .user-btn:hover, .hamburger-btn:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .search-btn.liquid-glass, .user-btn.liquid-glass, .hamburger-btn.liquid-glass {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .hamburger-menu {
            display: none;
        }

        @media (max-width: 1023px) {
            .hamburger-menu {
                display: block;
            }
        }

        .hamburger-icon {
            width: 1.25rem;
            height: 1.25rem;
            transition: transform 0.5s ease-out, opacity 0.3s ease-out;
        }

        .hamburger-icon.hidden {
            opacity: 0;
            transform: rotate(180deg) scale(0.5);
            position: absolute;
        }

        .hamburger-icon.visible {
            opacity: 1;
            transform: rotate(0) scale(1);
        }

        /* Mobile Menu */
        .mobile-menu {
            position: absolute;
            top: 4.5rem;
            left: 0;
            right: 0;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-top: 1px solid rgba(55, 65, 81, 1);
            border-bottom: 1px solid rgba(55, 65, 81, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 40;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }

        .mobile-menu.open {
            max-height: 500px;
        }

        .mobile-menu-content {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0;
        }

        .mobile-menu-link {
            padding: 0.75rem;
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: background-color 0.3s ease-out;
            font-size: 0.875rem;
            animation: slideInLeft 0.5s ease-out forwards;
            opacity: 0;
        }

        .mobile-menu-link:hover {
            background: rgba(55, 65, 81, 0.5);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-1rem);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .mobile-menu.open .mobile-menu-link:nth-child(1) { animation-delay: 50ms; }
        .mobile-menu.open .mobile-menu-link:nth-child(2) { animation-delay: 100ms; }
        .mobile-menu.open .mobile-menu-link:nth-child(3) { animation-delay: 150ms; }
        .mobile-menu.open .mobile-menu-link:nth-child(4) { animation-delay: 200ms; }
        .mobile-menu.open .mobile-menu-link:nth-child(5) { animation-delay: 250ms; }

        /* Hero Content */
        .hero-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem 1rem 2rem;
            gap: 2rem;
        }

        @media (min-width: 640px) {
            .hero-content {
                padding: 1.5rem 1.5rem 4rem;
            }
        }

        @media (min-width: 768px) {
            .hero-content {
                padding: 1.5rem 3rem 4rem;
                flex-direction: row;
                align-items: flex-end;
                gap: 2rem;
            }
        }

        .hero-left {
            flex: 1;
        }

        .metadata-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            text-xs;
            color: #fff;
        }

        @media (min-width: 640px) {
            .metadata-row {
                gap: 1.5rem;
                font-size: 0.875rem;
                margin-bottom: 2rem;
            }
        }

        @media (min-width: 768px) {
            .metadata-row {
                margin-bottom: 2rem;
            }
        }

        .metadata-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .metadata-icon {
            width: 1rem;
            height: 1rem;
            fill: currentColor;
        }

        @media (min-width: 640px) {
            .metadata-icon {
                width: 1.25rem;
                height: 1.25rem;
            }
        }

        .hero-title {
            font-size: 1.875rem;
            font-weight: 400;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        @media (min-width: 640px) {
            .hero-title {
                font-size: 3rem;
                margin-bottom: 1.5rem;
            }
        }

        @media (min-width: 768px) {
            .hero-title {
                font-size: 3.75rem;
                margin-bottom: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .hero-title {
                font-size: 4.5rem;
            }
        }

        .hero-description {
            font-size: 1rem;
            color: #9ca3af;
            margin-bottom: 1.5rem;
            max-width: 32rem;
            line-height: 1.6;
        }

        @media (min-width: 640px) {
            .hero-description {
                font-size: 1.125rem;
                margin-bottom: 2rem;
            }
        }

        @media (min-width: 768px) {
            .hero-description {
                font-size: 1.25rem;
                margin-bottom: 3rem;
            }
        }

        .cta-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .cta-buttons {
                gap: 1rem;
            }
        }

        .btn-watch {
            background: #fff;
            color: #000;
            padding: 0.625rem 1.5rem;
            border-radius: 9999px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            transition: background-color 0.3s ease-out;
        }

        @media (min-width: 640px) {
            .btn-watch {
                padding: 0.625rem 2rem;
                font-size: 1rem;
            }
        }

        .btn-watch:hover {
            background: #d1d5db;
        }

        .btn-learn {
            padding: 0.625rem 1.5rem;
            border-radius: 9999px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s ease-out;
        }

        @media (min-width: 640px) {
            .btn-learn {
                padding: 0.625rem 2rem;
                font-size: 1rem;
            }
        }

        .play-icon, .chevron-icon {
            width: 1.125rem;
            height: 1.125rem;
        }

        .hero-right {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-start;
        }

        @media (min-width: 640px) {
            .hero-right {
                gap: 1rem;
            }
        }

        @media (min-width: 768px) {
            .hero-right {
                justify-content: flex-end;
            }
        }

        .btn-nav {
            padding: 0.625rem 1rem;
            border-radius: 9999px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        @media (min-width: 640px) {
            .btn-nav {
                padding: 0.625rem 1.5rem;
                font-size: 1rem;
            }
        }

        .chevron-icon {
            width: 1.25rem;
            height: 1.25rem;
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260406_094145_4a271a6c-3869-4f1c-8aa7-aeb0cb227994.mp4" type="video/mp4">
    </video>

    <!-- Blur Overlay -->
    <div class="blur-overlay"></div>

    <!-- Main Container -->
    <div class="page-container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-logo" style="animation: blurFadeUp 1s ease-out forwards; animation-delay: 0ms;">
                CINEMATIC
            </div>

            <div class="navbar-center">
                <a href="#" class="nav-link animate-blur-fade-up" style="animation-delay: 100ms;">Movies</a>
                <a href="#" class="nav-link animate-blur-fade-up" style="animation-delay: 150ms;">TV Series</a>
                <a href="#" class="nav-link animate-blur-fade-up" style="animation-delay: 200ms;">Editor's Pick</a>
                <a href="#" class="nav-link animate-blur-fade-up" style="animation-delay: 250ms;">Interviews</a>
                <a href="#" class="nav-link animate-blur-fade-up" style="animation-delay: 300ms;">User Reviews</a>
            </div>

            <div class="navbar-right">
                <button class="search-btn liquid-glass search-btn-desktop animate-blur-fade-up" style="animation-delay: 350ms;">
                    <svg class="chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <span style="display: none;">Search</span>
                </button>

                <button class="user-btn liquid-glass user-btn-desktop animate-blur-fade-up" style="animation-delay: 400ms;">
                    <svg class="chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </button>

                <button class="hamburger-btn liquid-glass hamburger-menu animate-blur-fade-up" id="hamburgerBtn" style="animation-delay: 350ms;">
                    <svg class="hamburger-icon visible" id="menuIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                    <svg class="hamburger-icon hidden" id="xIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-menu-content">
                <a href="#" class="mobile-menu-link">Movies</a>
                <a href="#" class="mobile-menu-link">TV Series</a>
                <a href="#" class="mobile-menu-link">Editor's Pick</a>
                <a href="#" class="mobile-menu-link">Interviews</a>
                <a href="#" class="mobile-menu-link">User Reviews</a>
            </div>
        </div>

        <!-- Hero Content -->
        <div class="hero-content">
            <div class="hero-left">
                <!-- Metadata -->
                <div class="metadata-row animate-blur-fade-up" style="animation-delay: 300ms;">
                    <div class="metadata-item">
                        <svg class="metadata-icon" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
                        </svg>
                        <span>8.7/10 IMDB</span>
                    </div>
                    <div class="metadata-item">
                        <svg class="metadata-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>132 min</span>
                    </div>
                    <div class="metadata-item">
                        <svg class="metadata-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <span>April, 2025</span>
                    </div>
                </div>

                <!-- Title -->
                <h1 class="hero-title animate-blur-fade-up" style="animation-delay: 400ms;">Step Through. Work Smarter.</h1>

                <!-- Description -->
                <p class="hero-description animate-blur-fade-up" style="animation-delay: 500ms;">A voyage through forgotten realms, where past and future intertwine.</p>

                <!-- CTA Buttons -->
                <div class="cta-buttons">
                    <button class="btn-watch animate-blur-fade-up" style="animation-delay: 600ms;">
                        <svg class="play-icon" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"></path>
                        </svg>
                        <span>Watch Now</span>
                    </button>
                    <button class="btn-learn liquid-glass animate-blur-fade-up" style="animation-delay: 700ms; color: #fff;">
                        Learn More
                    </button>
                </div>
            </div>

            <!-- Navigation Arrows -->
            <div class="hero-right">
                <button class="btn-nav liquid-glass animate-blur-fade-up" style="animation-delay: 800ms; color: #fff;">
                    <svg class="chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    <span style="display: none;">Previous</span>
                </button>
                <button class="btn-nav liquid-glass animate-blur-fade-up" style="animation-delay: 900ms; color: #fff;">
                    <svg class="chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                    <span style="display: none;">Next</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Hamburger menu toggle
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const menuIcon = document.getElementById('menuIcon');
        const xIcon = document.getElementById('xIcon');

        hamburgerBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            menuIcon.classList.toggle('visible');
            menuIcon.classList.toggle('hidden');
            xIcon.classList.toggle('hidden');
            xIcon.classList.toggle('visible');
        });

        // Close menu when link is clicked
        document.querySelectorAll('.mobile-menu-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('open');
                menuIcon.classList.add('visible');
                menuIcon.classList.remove('hidden');
                xIcon.classList.add('hidden');
                xIcon.classList.remove('visible');
            });
        });
    </script>
</body>
</html>
